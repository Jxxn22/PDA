spring.application.name=demo

# Configuración de archivos estáticos
spring.web.resources.static-locations=classpath:/static/

# Configuración de Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# CONFIGURACIÓN DE BASE DE DATOS MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/gescazone
spring.data.mongodb.auto-index-creation=true

# CONFIGURACIÓN GENERAL
spring.jackson.time-zone=America/Bogota
spring.jackson.serialization.write-dates-as-timestamps=false

# TIEMPO DE VIDA DE LA SESIÓN (30 minutos)
server.servlet.session.timeout=30m

# Cookie de sesión
server.servlet.session.cookie.name=GESCAZONE-SESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.max-age=1800
# Lax es necesario para que la cookie se envíe en el redirect cross-site
# que hace Google al devolver el control a /login/oauth2/code/google.
# Con strict la cookie no viaja y Spring Security pierde el state/nonce.
server.servlet.session.cookie.same-site=lax

# JWT (expiration en milisegundos: 86400000 = 24 horas)
jwt.secret=gescazone-super-secreto-2024-conjunto-residencial-clave-larga
jwt.expiration=86400000

# ══════════════════════════════════════════════════════════════════
#  OAUTH2 - Google
#
#  PROPÓSITO: verificación de identidad para acciones internas.
#  NO se usa para iniciar sesión en el sistema.
#
#  El redirect URI debe estar registrado en Google Cloud Console:
#  APIs & Services → Credentials → tu OAuth 2.0 Client ID
#  → Authorized redirect URIs → agregar:
#    http://localhost:8080/login/oauth2/code/google
#
#  FIX: se agrega "openid" al scope. Sin este scope, Google responde
#  como OAuth2 puro (no OIDC) y Spring Security crea un DefaultOAuth2User
#  en vez de OidcUser, causando ClassCastException en el successHandler.
#  Con "openid", Google retorna un ID token y Spring crea correctamente
#  un OidcUser con acceso a getEmail(), getIdToken(), etc.
# ══════════════════════════════════════════════════════════════════
spring.security.oauth2.client.registration.google.client-id=TU_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=TU_CLIENT_SECRET
# FIX: "openid" es obligatorio para el flujo OIDC. Sin él, Spring Security
# usa OAuth2UserService en vez de OidcUserService y no hay ID token.
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}