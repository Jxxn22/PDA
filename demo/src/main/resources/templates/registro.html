<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESCAZONE - Registro</title>
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/argon-dashboard-tailwind.css}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
        }
        .login-header {
            background: linear-gradient(135deg, #5e72e4 0%, #825ee4 100%);
            padding: 30px;
            text-align: center;
            color: white;
        }
        .logo-container { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .logo-container img { width: 70px; height: 70px; border-radius: 14px; background: white; padding: 8px; }
        .logo-container h1 { font-size: 24px; font-weight: 700; letter-spacing: 1px; }
        .login-body { padding: 30px; }
        .form-title { font-size: 22px; font-weight: 600; color: #344767; margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #344767; margin-bottom: 6px; }
        .form-group input,
        .form-group select {
            width: 100%; padding: 11px 14px;
            border: 2px solid #e9ecef; border-radius: 10px;
            font-size: 14px; font-family: 'Open Sans', sans-serif;
            transition: border-color 0.3s; background: white;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none; border-color: #5e72e4;
            box-shadow: 0 0 0 3px rgba(94,114,228,0.1);
        }
        .error-message {
            background-color: #f8d7da; color: #721c24;
            border: 1px solid #f5c6cb; padding: 12px 16px;
            border-radius: 8px; margin-bottom: 16px;
            display: none; font-size: 13px;
        }
        .error-message.show { display: block; }
        .field-error { display: block; color: #721c24; font-size: 12px; margin-top: 4px; }
        .button-group { display: flex; gap: 12px; margin-top: 24px; }
        .btn {
            flex: 1; padding: 13px; border: none; border-radius: 10px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            font-family: 'Open Sans', sans-serif;
            text-align: center; text-decoration: none;
            display: inline-block; transition: all 0.3s;
        }
        .btn-cerrar { background: #f8f9fa; color: #344767; border: 2px solid #e9ecef; }
        .btn-cerrar:hover { background: #e9ecef; }
        .btn-aceptar { background: linear-gradient(135deg, #5e72e4 0%, #825ee4 100%); color: white; }
        .btn-aceptar:hover { box-shadow: 0 8px 20px rgba(94,114,228,0.4); transform: translateY(-1px); }
        .login-link { text-align: center; margin-top: 18px; font-size: 13px; color: #8898aa; }
        .login-link a { color: #5e72e4; font-weight: 600; text-decoration: none; }
        .login-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo-container">
                <img th:src="@{/img/apple-icon.png}" alt="Logo" onerror="this.style.display='none'">
                <h1>GESCAZONE</h1>
            </div>
        </div>

        <div class="login-body">
            <h2 class="form-title">Crear Cuenta</h2>

            <div th:if="${errorDocumento}" class="error-message show" th:text="${errorDocumento}"></div>

            <form th:action="@{/registro}" th:object="${usuario}" method="post" id="registroForm">

                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" th:field="*{nombre}" required maxlength="50"
                           placeholder="Ingrese su nombre" autocomplete="given-name">
                    <span th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}" class="field-error"></span>
                </div>

                <div class="form-group">
                    <label>Apellido</label>
                    <input type="text" th:field="*{apellido}" required maxlength="50"
                           placeholder="Ingrese su apellido" autocomplete="family-name">
                    <span th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}" class="field-error"></span>
                </div>

                <!-- Tipo de documento -->
                <div class="form-group">
                    <label>Tipo de Documento</label>
                    <select name="nombreTipoDocumento" required>
                        <option value="">-- Seleccione --</option>
                        <option th:each="tipo : ${tiposDocumento}"
                                th:value="${tipo}"
                                th:text="${tipo}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Número de Documento</label>
                    <input type="text" id="numeroDocumento" th:field="*{numeroDocumento}"
                           required maxlength="15" placeholder="Ingrese su número de documento"
                           autocomplete="off">
                    <span th:if="${#fields.hasErrors('numeroDocumento')}" th:errors="*{numeroDocumento}" class="field-error"></span>
                </div>

                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" th:field="*{correo}" required maxlength="100"
                           placeholder="Ingrese su correo electrónico" autocomplete="email">
                    <span th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}" class="field-error"></span>
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="contrasena" th:field="*{contrasena}"
                           required minlength="6" placeholder="Mínimo 6 caracteres"
                           autocomplete="new-password">
                    <span th:if="${#fields.hasErrors('contrasena')}" th:errors="*{contrasena}" class="field-error"></span>
                </div>

                <div class="form-group">
                    <label>Confirmar Contraseña</label>
                    <input type="password" id="confirmarContrasena" name="confirmarContrasena"
                           required minlength="6" placeholder="Repita su contraseña"
                           autocomplete="new-password">
                </div>

                <div class="button-group">
                    <a th:href="@{/login}" class="btn btn-cerrar">Cancelar</a>
                    <button type="submit" class="btn btn-aceptar">Registrarse</button>
                </div>
            </form>

            <div class="login-link">
                ¿Ya tiene cuenta? <a th:href="@{/login}">Inicie sesión aquí</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('numeroDocumento').addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '');
        });

        document.getElementById('registroForm').addEventListener('submit', function(e) {
            const contrasena = document.getElementById('contrasena').value;
            const confirmar  = document.getElementById('confirmarContrasena').value;
            if (contrasena !== confirmar) {
                e.preventDefault();
                mostrarError('Las contraseñas no coinciden.');
                return;
            }
            if (contrasena.length < 6) {
                e.preventDefault();
                mostrarError('La contraseña debe tener al menos 6 caracteres.');
            }
        });

        function mostrarError(mensaje) {
            let errorDiv = document.querySelector('.error-message.custom');
            if (!errorDiv) {
                errorDiv = document.createElement('div');
                errorDiv.className = 'error-message custom show';
                document.querySelector('.form-title').after(errorDiv);
            }
            errorDiv.textContent = mensaje;
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }
    </script>
</body>
</html>
