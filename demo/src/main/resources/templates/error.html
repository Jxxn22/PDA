<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESCAZONE - Error</title>
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700" rel="stylesheet"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .error-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        .error-header {
            background: linear-gradient(135deg, #5e72e4 0%, #825ee4 100%);
            padding: 30px;
            color: white;
        }

        .error-header img {
            width: 65px; height: 65px;
            border-radius: 14px;
            background: white; padding: 8px;
            margin-bottom: 10px;
        }

        .error-header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .error-body {
            padding: 40px 30px;
        }

        .error-code {
            font-size: 72px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 12px;
        }

        .error-code.code-403 { color: #f5365c; }
        .error-code.code-404 { color: #fb6340; }
        .error-code.code-500 { color: #f5365c; }

        .error-title {
            font-size: 18px;
            font-weight: 600;
            color: #344767;
            margin-bottom: 10px;
        }

        .error-mensaje {
            font-size: 14px;
            color: #6c757d;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .error-ruta {
            font-size: 12px;
            color: #adb5bd;
            background: #f8f9fa;
            padding: 8px 14px;
            border-radius: 8px;
            margin-bottom: 30px;
            word-break: break-all;
        }

        .error-ruta code {
            color: #5e72e4;
            font-family: monospace;
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Open Sans', sans-serif;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #5e72e4 0%, #825ee4 100%);
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 8px 20px rgba(94,114,228,0.4);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #344767;
            border: 2px solid #e9ecef;
        }

        .btn-secondary:hover {
            background: #e9ecef;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-header">
            <img th:src="@{/img/apple-icon.png}" alt="Logo" onerror="this.style.display='none'">
            <h1>GESCAZONE</h1>
        </div>

        <div class="error-body">

            <!-- Código de error grande -->
            <div class="error-code"
                 th:classappend="${codigo == 403} ? 'code-403' : (${codigo == 404} ? 'code-404' : 'code-500')"
                 th:text="${codigo}">
                Error
            </div>

            <!-- Título según código -->
            <div class="error-title"
                 th:text="${codigo == 403} ? 'Acceso Denegado' :
                           (${codigo == 404} ? 'Página No Encontrada' :
                           'Error Interno')">
            </div>

            <!-- Mensaje descriptivo -->
            <p class="error-mensaje" th:text="${mensaje}">
                Ha ocurrido un error.
            </p>

            <!-- Ruta que causó el error -->
            <div class="error-ruta" th:if="${ruta != null and !ruta.isEmpty()}">
                Ruta: <code th:text="${ruta}"></code>
            </div>

            <div class="button-group">
                <a th:href="@{/inicio}" class="btn btn-primary">Ir al inicio</a>
                <button onclick="history.back()" class="btn btn-secondary">Volver</button>
            </div>
        </div>
    </div>
</body>
</html>
